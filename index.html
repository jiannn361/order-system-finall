<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>點餐系統</title>
    <!-- 載入核心套件 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        body { -webkit-tap-highlight-color: transparent; font-family: -apple-system, sans-serif; background-color: #f8fafc; }
        #loading { position: fixed; inset: 0; background: #fff; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #ea580c; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="text-gray-800">

    <div id="loading">
        <div class="spinner"></div>
        <div class="mt-4 font-bold text-gray-500">系統載入中...</div>
        <div id="error-msg" class="text-xs text-red-500 mt-2 px-4 text-center"></div>
        <button onclick="window.location.reload()" class="mt-4 text-xs text-gray-400 underline">重新整理</button>
    </div>

    <div id="root" style="display:none;"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // 內建精美圖示組
        const Icon = ({ name, size=20, className="" }) => {
            const icons = {
                Clock: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>,
                Settings: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.09a2 2 0 0 1-1-1.74v-.47a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>,
                Volume2: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>,
                LayoutGrid: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="7" height="7" x="3" y="3" rx="1"/><rect width="7" height="7" x="14" y="3" rx="1"/><rect width="7" height="7" x="14" y="14" rx="1"/><rect width="7" height="7" x="3" y="14" rx="1"/></svg>,
                Package: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m7.5 4.27 9 5.15"/><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7 8.7 5 8.7-5"/><path d="M12 22V12"/></svg>,
                Coffee: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M10 2v2"/><path d="M14 2v2"/><path d="M6 2v2"/><path d="M18 8a4 4 0 0 1 4 4 4 4 0 0 1-4 4h-4.06a4 4 0 0 1-3.75-2.71L10 13a4 4 0 0 1-3.75-2.71L6 10a4 4 0 0 1 4-4h4Z"/><path d="M2 18h20v2a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2v-2Z"/></svg>,
                Trash2: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>,
                ShoppingBag: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>,
                X: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M18 6 6 18"/><path d="m6 6 18 12"/></svg>
            };
            return icons[name] || null;
        };

        const App = () => {
            const [shopState, setShopState] = useState({ name: "連線中...", isOpen: false, notices: [] });
            const [menuData, setMenuData] = useState({ combos: [], items: [] });
            const [cart, setCart] = useState([]);
            
            // 介面控制
            const [activeCategory, setActiveCategory] = useState('all');
            const [selectedItem, setSelectedItem] = useState(null);
            const [showCart, setShowCart] = useState(false); 
            const [adminStep, setAdminStep] = useState(0); 
            const [inputPwd, setInputPwd] = useState('');
            const [isUpdating, setIsUpdating] = useState(false);
            const [isInClient, setIsInClient] = useState(true);
            
            // 訂單狀態
            const [globalNote, setGlobalNote] = useState('');
            const tzOffset = (new Date()).getTimezoneOffset() * 60000; 
            const localISODate = (new Date(Date.now() - tzOffset)).toISOString().slice(0, 10);
            const [pickupDate, setPickupDate] = useState(localISODate);
            const [pickupTime, setPickupTime] = useState('');

            // ★★★ 您的專屬設定 ★★★
            const LIFF_ID = "2008979082-1pN3UOql"; 
            const GAS_URL = "https://script.google.com/macros/s/AKfycbw7GHuyai-Nik51gf0prMzdtCC9bRaYnLl2DwpU5tAapcP8aaMP0mi5-2t1mI_tkC4CXA/exec"; 

            useEffect(() => {
                // 初始化 LIFF
                if (window.liff) {
                    liff.init({ liffId: LIFF_ID }).then(() => {
                        setIsInClient(liff.isInClient());
                        if (liff.isInClient() && !liff.isLoggedIn()) liff.login();
                    }).catch(e => console.error("LIFF 錯誤", e));
                }

                // 抓取菜單資料
                fetch(GAS_URL + "?action=getMenu")
                    .then(res => res.json())
                    .then(data => {
                        if (data.status === "success") {
                            setShopState(data.shop);
                            setMenuData(data.menu);
                            document.getElementById('loading').style.display = 'none';
                            document.getElementById('root').style.display = 'block';
                        } else {
                            document.getElementById('error-msg').innerText = "載入失敗：" + JSON.stringify(data);
                        }
                    })
                    .catch(e => {
                        document.getElementById('error-msg').innerText = "網路連線異常，請重新整理";
                    });
            }, []);

            const displayItems = useMemo(() => {
                const all = [...menuData.combos, ...menuData.items];
                if (activeCategory === 'all') return all;
                if (activeCategory === 'combo') return menuData.combos;
                if (activeCategory === 'single') return menuData.items;
                return all;
            }, [menuData, activeCategory]);

            const forceCopy = (text) => {
                if (navigator.clipboard && navigator.clipboard.writeText) { 
                    navigator.clipboard.writeText(text).catch(() => {}); 
                }
                try {
                    const t = document.createElement("textarea");
                    t.value = text; t.style.position = "fixed"; t.style.left = "-9999px";
                    document.body.appendChild(t); t.focus(); t.select(); 
                    document.execCommand('copy'); document.body.removeChild(t);
                } catch (err) {}
            };

            // 🌟 產生完美卡片 (無自取字樣 + 加入店家確認按鈕)
            const getFlexMessage = (cart, total, note, pDate, pTime, orderId) => {
                const itemsRows = cart.map(item => ({
                    type: "box", layout: "vertical", margin: "md",
                    contents: [
                        {
                            type: "box", layout: "horizontal",
                            contents: [
                                { type: "text", text: item.name, size: "md", weight: "bold", color: "#333333", flex: 6, wrap: true },
                                { type: "text", text: `x${item.quantity}`, size: "sm", color: "#666666", align: "center", flex: 2 },
                                { type: "text", text: `$${item.displayPrice}`, size: "sm", weight: "bold", color: "#ea580c", align: "end", flex: 3 }
                            ]
                        },
                        item.customs && { type: "text", text: `└ ${item.customs}`, size: "xs", color: "#9ca3af", wrap: true, margin: "sm", offsetStart: "md" }
                    ].filter(Boolean)
                }));

                return {
                    type: "bubble",
                    body: {
                        type: "box", layout: "vertical",
                        contents: [
                            { type: "text", text: "新訂單", weight: "bold", color: "#0044aa", size: "xl", align: "center" },
                            { type: "text", text: orderId, weight: "bold", size: "3xl", align: "center", margin: "md", color: "#333333" },
                            { type: "text", text: `訂單編號：#${orderId}`, size: "xs", color: "#aaaaaa", align: "center" },
                            { type: "separator", margin: "lg" },
                            { 
                                type: "box", layout: "vertical", margin: "md", backgroundColor: "#fff7ed", cornerRadius: "md", paddingAll: "md",
                                contents: [
                                    { type: "text", text: "🕒 預定取餐時間", size: "xs", color: "#ea580c", weight: "bold" },
                                    { type: "text", text: `${pDate} ${pTime}`, size: "lg", color: "#333333", weight: "bold", margin: "sm" }
                                ]
                            },
                            { type: "separator", margin: "lg" },
                            { type: "box", layout: "vertical", margin: "lg", contents: itemsRows },
                            { type: "separator", margin: "lg", color: "#e5e7eb" },
                            {
                                type: "box", layout: "horizontal", margin: "lg",
                                contents: [
                                    { type: "text", text: "總計", size: "md", color: "#6b7280", weight: "bold", gravity: "bottom" },
                                    { type: "text", text: `$${total}`, size: "2xl", color: "#ea580c", align: "end", weight: "bold" }
                                ]
                            },
                            note ? { 
                                type: "box", layout: "vertical", margin: "lg", backgroundColor: "#f3f4f6", cornerRadius: "md", paddingAll: "md",
                                contents: [
                                    { type: "text", text: "備註事項：", size: "xs", color: "#6b7280", weight: "bold" },
                                    { type: "text", text: note, size: "sm", color: "#374151", wrap: true, margin: "xs" }
                                ]
                            } : { type: "spacer" }
                        ]
                    },
                    footer: {
                        type: "box", layout: "vertical", spacing: "sm",
                        contents: [
                            {
                                type: "button", style: "primary", color: "#10b981", height: "sm",
                                // 🌟 專屬店家確認按鈕 (會觸發密碼鎖)
                                action: { type: "uri", label: "👨‍🍳 店家按此確認", uri: `${GAS_URL}?action=confirmOrder&orderId=${orderId}` }
                            }
                        ]
                    }
                };
            };

            // 🌟 終極送單邏輯 (含顧客 ID 擷取與防呆)
            const submitOrder = async () => {
                if (cart.length === 0) return;
                if (!pickupDate || !pickupTime) { alert("❌ 請選擇「預定取餐的日期與時間」！"); return; }
                
                const selectedDateTime = new Date(`${pickupDate}T${pickupTime}`);
                const now = new Date();
                if (selectedDateTime < new Date(now.getTime() + 15 * 60000)) {
                    alert("❌ 為了有充足時間準備餐點，取餐時間請至少選擇「15分鐘」之後！");
                    return;
                }

                setIsUpdating(true); 

                const orderId = new Date().getTime().toString().slice(-6);
                const total = cart.reduce((s, i) => s + i.displayPrice, 0);
                const flexMsg = getFlexMessage(cart, total, globalNote, pickupDate, pickupTime, orderId);
                const clientTime = new Date().toLocaleString('zh-TW', { timeZone: 'Asia/Taipei', hour12: false });
                
                let textMsg = `📋 新訂單 #${orderId}\n🕒 取餐：${pickupDate} ${pickupTime}\n----------------\n`;
                cart.forEach(i => textMsg += `${i.name} x${i.quantity} ${i.customs ? '('+i.customs+')' : ''}\n`);
                textMsg += `----------------\n💰 總計：$${total}`;
                if(globalNote) textMsg += `\n備註：${globalNote}`;

                forceCopy(textMsg);

                try {
                    // 🌟 偷抓客人的 LINE ID
                    let customerUserId = "";
                    if (window.liff && window.liff.isInClient() && window.liff.isLoggedIn()) {
                        try {
                            const profile = await window.liff.getProfile();
                            customerUserId = profile.userId;
                        } catch(e) {}
                    }

                    const backendNote = `[取餐: ${pickupDate} ${pickupTime}] ${globalNote}`;
                    
                    // 送到後台
                    await fetch(GAS_URL, { 
                        method: 'POST', mode: 'no-cors',
                        body: JSON.stringify({ cart, total, globalNote: backendNote, clientTime, orderId, userId: customerUserId, action:"submit" })
                    });
                    
                    if (window.liff && window.liff.isInClient()) {
                        try {
                            await window.liff.sendMessages([{ type: 'flex', altText: `🍱 新訂單 $${total}`, contents: flexMsg }]);
                            window.liff.closeWindow(); 
                        } catch (err) {
                            alert(`⚠️ 自動傳送失敗：${err.message}\n\n(通常是因為權限沒開，將為您開啟手動分享視窗)`);
                            if (window.liff.isApiAvailable('shareTargetPicker')) {
                                const res = await window.liff.shareTargetPicker([{ type: 'flex', altText: `🍱 新訂單 $${total}`, contents: flexMsg }]);
                                if (res) { window.liff.closeWindow(); }
                                else {
                                    alert("✅ 訂單已送出至後台！\n(您取消了傳送卡片)");
                                    setCart([]); setShowCart(false);
                                }
                            } else {
                                alert("✅ 訂單已送出至後台！\n(無法發送卡片，請手動貼上訂單文字)");
                                window.liff.closeWindow();
                            }
                        }
                    } else {
                        alert("✅ 訂單已建立！\n將為您開啟 LINE 傳送給店家。");
                        window.location.href = "https://line.me/R/msg/text/?" + encodeURIComponent(textMsg);
                    }
                } catch(e) {
                    alert("⚠️ 網路異常，將開啟文字傳送");
                    window.location.href = "https://line.me/R/msg/text/?" + encodeURIComponent(textMsg);
                } finally {
                    setIsUpdating(false);
                }
            };

            const toggleStatus = async (status) => {
                setIsUpdating(true);
                try {
                    await fetch(GAS_URL, { 
                        method: 'POST', mode: 'no-cors', 
                        body: JSON.stringify({ action: "updateStatus", password: inputPwd, status: status })
                    });
                    setShopState(prev => ({ ...prev, isOpen: (status === 'Y') }));
                    alert("✅ 指令發送成功，請稍候重整確認");
                    setAdminStep(0);
                } catch(e) { 
                    alert("連線錯誤"); 
                }
                setIsUpdating(false);
            };

            const removeFromCart = (index) => {
                const newCart = cart.filter((_, i) => i !== index);
                setCart(newCart);
                if (newCart.length === 0) setShowCart(false);
            };

            const addToCart = () => {
                if (selectedItem.type === '套餐') {
                    if (!selectedItem.main) { alert("❌ 請選擇主食"); return; }
                    if (!selectedItem.soup) { alert("❌ 請選擇湯品/飲品"); return; }
                }
                const addonPrice = (selectedItem.addons || []).length * 10;
                const totalP = (selectedItem.basePrice + addonPrice) * selectedItem.quantity;
                const customs = [
                    selectedItem.main ? `主食:${selectedItem.main}` : '',
                    selectedItem.soup ? `湯品:${selectedItem.soup}` : '',
                    selectedItem.spicy,
                    ...(selectedItem.addons || []),
                    selectedItem.itemNote ? `備註:${selectedItem.itemNote}` : ''
                ].filter(Boolean);
                
                setCart([...cart, { ...selectedItem, displayPrice: totalP, customs: customs.join(' / ') }]);
                setSelectedItem(null); 
            };

            const showExtras = selectedItem && (selectedItem.type === '套餐' || selectedItem.name.includes('飯') || selectedItem.name.includes('麵'));

            return (
                <div className="max-w-md mx-auto min-h-screen bg-slate-50 relative pb-24 shadow-xl">
                    {/* 1. 店名跟營業時間置中 */}
                    <header className="sticky top-0 z-30 bg-white/90 backdrop-blur-md border-b border-gray-100 px-6 pt-8 pb-4">
                        <div className="flex flex-col items-center relative">
                            <span className={`text-[10px] font-bold uppercase tracking-widest mb-1 flex items-center gap-1 ${shopState.isOpen ? 'text-green-600' : 'text-red-500'}`}>
                                <Icon name="Clock" size={12} /> 
                                {shopState.isOpen ? '營業中 Open' : '休息中 Closed'}
                            </span>
                            <h1 className="text-2xl font-black text-gray-900 tracking-tight text-center">{shopState.name}</h1>
                            
                            {/* 設定按鈕移到右上角 */}
                            <button onClick={() => setAdminStep(1)} className="absolute right-0 top-1/2 -translate-y-1/2 w-10 h-10 bg-gray-50 rounded-full flex items-center justify-center text-gray-400 hover:text-gray-700 hover:bg-gray-200 transition-colors border border-gray-200">
                                <Icon name="Settings" size={18} />
                            </button>
                        </div>
                        {!isInClient && <div className="text-[10px] text-gray-400 mt-2 bg-gray-100 px-2 py-1 rounded-md inline-block text-center w-full">(外部瀏覽器模式)</div>}
                    </header>

                    {shopState.notices && shopState.notices.length > 0 && (
                        <div className="mx-5 mt-5 mb-6 bg-orange-50 border border-orange-100 rounded-2xl p-4 flex items-start gap-3 shadow-sm">
                            <div className="text-orange-500 mt-0.5 shrink-0"><Icon name="Volume2" size={18} /></div>
                            <div className="text-sm text-orange-800 leading-relaxed font-medium">
                                {shopState.notices.map((n, i) => <div key={i} className="mb-1">{n.trim()}</div>)}
                            </div>
                        </div>
                    )}

                    {/* 2. 移除分類選單 */}

                    <div className="px-5 space-y-4">
                        {displayItems.map(item => (
                            <div key={item.id} onClick={()=>setSelectedItem({...item, quantity:1, basePrice:item.price, addons:[], spicy:'不辣', main:'', soup:'', itemNote:''})} 
                                 className="bg-white rounded-[24px] p-5 shadow-sm border border-gray-100 flex justify-between items-center transition-transform active:scale-95 group cursor-pointer">
                                <div className="flex-1 pr-4">
                                    <div className="flex items-center gap-2 mb-1">
                                        {item.type === '套餐' && <span className="text-[10px] bg-amber-100 text-amber-700 px-2 py-0.5 rounded-md font-bold uppercase">Combo</span>}
                                        <h3 className="text-lg font-bold text-gray-900">{item.name}</h3>
                                    </div>
                                    <p className="text-sm text-gray-400 line-clamp-2 mt-1">{item.info}</p>
                                </div>
                                {/* 3. 價錢顏色不要有外框 */}
                                <div className="text-orange-600 font-black text-2xl">
                                    ${item.price}
                                </div>
                            </div>
                        ))}
                    </div>

                    {cart.length > 0 && !showCart && !selectedItem && (
                        <div className="fixed bottom-6 left-0 right-0 flex justify-center z-40 px-5">
                            <div className="bg-gray-900/95 backdrop-blur-xl shadow-2xl rounded-full px-2 py-2 flex items-center justify-between w-full border border-gray-700">
                                <div className="flex items-center pl-4 cursor-pointer" onClick={() => setShowCart(true)}>
                                    <div className="relative">
                                        <div className="w-10 h-10 bg-gray-800 rounded-full flex items-center justify-center text-white">
                                            <Icon name="ShoppingBag" size={18} />
                                        </div>
                                        <span className="absolute -top-1 -right-1 bg-rose-500 text-white text-[10px] font-bold px-2 py-0.5 rounded-full border-2 border-gray-900">{cart.length}</span>
                                    </div>
                                    <div className="ml-4">
                                        <div className="text-xs text-gray-400 font-medium mb-0.5">目前金額</div>
                                        <div className="text-xl font-bold text-white tracking-wide">${cart.reduce((s,i)=>s+i.displayPrice, 0)}</div>
                                    </div>
                                </div>
                                <button onClick={() => setShowCart(true)} className={`px-8 py-3.5 rounded-full font-bold text-sm text-white transition-all shadow-lg ${shopState.isOpen ? 'bg-orange-600 active:scale-95' : 'bg-gray-600 shadow-none'}`}>
                                    去結帳
                                </button>
                            </div>
                        </div>
                    )}

                    {selectedItem && (
                        <div className="fixed inset-0 z-50 flex flex-col justify-end">
                            <div className="absolute inset-0 bg-gray-900/50 backdrop-blur-sm" onClick={()=>setSelectedItem(null)}></div>
                            <div className="relative bg-white w-full rounded-t-[32px] shadow-2xl max-h-[90vh] flex flex-col">
                                <div className="sticky top-0 bg-white/95 backdrop-blur-md rounded-t-[32px] pt-4 pb-4 px-6 z-10 border-b border-gray-100 flex justify-between items-center">
                                    <div className="absolute top-2 left-1/2 -translate-x-1/2 w-12 h-1.5 bg-gray-200 rounded-full"></div>
                                    <div>
                                        <h3 className="text-2xl font-black text-gray-900 mt-2">{selectedItem.name}</h3>
                                        <div className="text-orange-600 font-bold text-xl mt-1">${selectedItem.basePrice}</div>
                                    </div>
                                    <button onClick={()=>setSelectedItem(null)} className="w-8 h-8 bg-gray-100 rounded-full flex items-center justify-center text-gray-500">
                                        <Icon name="X" size={18} />
                                    </button>
                                </div>

                                <div className="p-6 overflow-y-auto no-scrollbar space-y-6 flex-1">
                                    {selectedItem.type === "套餐" && (
                                        <div className="space-y-6">
                                            <div className="space-y-3">
                                                <p className="text-sm font-bold text-gray-800">主食選擇 <span className="text-rose-500">*</span></p>
                                                <div className="grid grid-cols-2 gap-3">
                                                    {selectedItem.mainOptions.map(m => (
                                                        <button key={m} onClick={()=>setSelectedItem({...selectedItem, main:m})} className={`py-4 rounded-2xl text-sm font-bold transition-all border-2 ${selectedItem.main===m?'border-orange-500 bg-orange-50 text-orange-700':'border-transparent bg-gray-50 text-gray-600'}`}>{m}</button>
                                                    ))}
                                                </div>
                                            </div>
                                            <div className="space-y-3">
                                                <p className="text-sm font-bold text-gray-800">湯品選擇 <span className="text-rose-500">*</span></p>
                                                <div className="grid grid-cols-2 gap-3">
                                                    {selectedItem.soupOptions.map(s => (
                                                        <button key={s} onClick={()=>setSelectedItem({...selectedItem, soup:s})} className={`py-4 rounded-2xl text-sm font-bold transition-all border-2 ${selectedItem.soup===s?'border-orange-500 bg-orange-50 text-orange-700':'border-transparent bg-gray-50 text-gray-600'}`}>{s}</button>
                                                    ))}
                                                </div>
                                            </div>
                                        </div>
                                    )}

                                    {showExtras && (
                                        <>
                                            <div className="space-y-3">
                                                <p className="text-sm font-bold text-gray-800">辣度</p>
                                                <div className="flex gap-3">
                                                    {['不辣','小辣','大辣'].map(s => (
                                                        <button key={s} onClick={()=>setSelectedItem({...selectedItem, spicy:s})} className={`flex-1 py-3 rounded-xl text-sm font-bold transition-all border-2 ${selectedItem.spicy===s?'border-orange-500 bg-orange-50 text-orange-700':'border-transparent bg-gray-50 text-gray-500'}`}>{s}</button>
                                                    ))}
                                                </div>
                                            </div>
                                            <div className="space-y-3">
                                                <p className="text-sm font-bold text-gray-800">加購 (+10元)</p>
                                                <div className="flex gap-3">
                                                    <button onClick={()=>{
                                                        const t = selectedItem.name.includes('麵') ? '加麵' : '加飯';
                                                        const h = selectedItem.addons.includes(t);
                                                        setSelectedItem({...selectedItem, addons: h ? selectedItem.addons.filter(a=>a!==t) : [...selectedItem.addons, t]})
                                                    }} className={`flex-1 py-3 rounded-xl text-sm font-bold transition-all border-2 ${selectedItem.addons.includes(selectedItem.name.includes('麵')?'加麵':'加飯')?'border-gray-800 bg-gray-800 text-white':'border-transparent bg-gray-50 text-gray-600'}`}>
                                                        {selectedItem.name.includes('麵') ? '加麵' : '加飯'}
                                                    </button>
                                                    <button onClick={()=>{
                                                        const h = selectedItem.addons.includes('加菜');
                                                        setSelectedItem({...selectedItem, addons: h ? selectedItem.addons.filter(a=>a!=='加菜') : [...selectedItem.addons, '加菜']})
                                                    }} className={`flex-1 py-3 rounded-xl text-sm font-bold transition-all border-2 ${selectedItem.addons.includes('加菜')?'border-gray-800 bg-gray-800 text-white':'border-transparent bg-gray-50 text-gray-600'}`}>加菜</button>
                                                </div>
                                            </div>
                                        </>
                                    )}

                                    <div className="space-y-2 pb-6">
                                        <p className="text-sm font-bold text-gray-800">單品備註</p>
                                        <textarea placeholder="例如：不要蔥、湯分開..." className="w-full p-4 bg-gray-50 rounded-2xl text-sm border outline-none border-gray-200" rows="2" value={selectedItem.itemNote || ''} onChange={e=>setSelectedItem({...selectedItem, itemNote:e.target.value})} />
                                    </div>
                                </div>
                                
                                <div className="p-5 bg-white border-t border-gray-100">
                                    <button onClick={addToCart} className="w-full py-4 bg-orange-600 text-white rounded-full font-bold text-lg shadow-lg active:scale-95 transition-transform flex justify-center items-center gap-2">
                                        加入購物車 <span className="font-normal text-orange-200">|</span> ${(selectedItem.basePrice + ((selectedItem.addons||[]).length*10)) * selectedItem.quantity}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {showCart && (
                        <div className="fixed inset-0 z-[60] flex flex-col justify-end">
                            <div className="absolute inset-0 bg-gray-900/60 backdrop-blur-sm" onClick={() => setShowCart(false)}></div>
                            <div className="relative bg-gray-50 w-full rounded-t-[32px] shadow-2xl max-h-[95vh] flex flex-col">
                                
                                <div className="bg-white rounded-t-[32px] px-6 py-5 flex justify-between items-center border-b border-gray-100">
                                    <h3 className="font-black text-2xl text-gray-900">結帳確認</h3>
                                    <button onClick={() => setShowCart(false)} className="w-8 h-8 bg-gray-100 rounded-full flex items-center justify-center text-gray-500">
                                        <Icon name="X" size={18} />
                                    </button>
                                </div>
                                
                                <div className="p-5 overflow-y-auto no-scrollbar space-y-4 flex-1">
                                    <div className="bg-white rounded-[24px] p-2 shadow-sm border border-gray-100">
                                        {cart.map((item, idx) => (
                                            <div key={idx} className="flex justify-between items-center p-4 border-b border-gray-50 last:border-0">
                                                <div className="flex-1">
                                                    <div className="font-bold text-base text-gray-900">{item.name} <span className="text-gray-400 text-sm ml-1">x{item.quantity}</span></div>
                                                    <div className="text-xs text-gray-400 mt-1 leading-relaxed">{item.customs}</div>
                                                    <div className="text-orange-600 font-bold text-sm mt-1">${item.displayPrice}</div>
                                                </div>
                                                <button onClick={() => removeFromCart(idx)} className="w-10 h-10 ml-3 bg-rose-50 text-rose-500 rounded-full flex items-center justify-center active:bg-rose-100 transition">
                                                    <Icon name="Trash2" size={16} />
                                                </button>
                                            </div>
                                        ))}
                                    </div>
                                    
                                    <div className="bg-white rounded-[24px] p-5 shadow-sm border border-gray-100 space-y-5">
                                        <div>
                                            <p className="text-sm font-bold text-gray-800 mb-3 flex items-center gap-2"><Icon name="Clock" size={16} /> 預定取餐時間 <span className="text-rose-500">*</span></p>
                                            <div className="flex gap-3">
                                                <input type="date" className="flex-1 p-3.5 bg-gray-50 rounded-xl text-sm font-medium border outline-none border-gray-200" value={pickupDate} onChange={e=>setPickupDate(e.target.value)} />
                                                <input type="time" className="flex-1 p-3.5 bg-gray-50 rounded-xl text-sm font-medium border outline-none border-gray-200" value={pickupTime} onChange={e=>setPickupTime(e.target.value)} />
                                            </div>
                                        </div>
                                        <hr className="border-gray-100" />
                                        <div>
                                            <p className="text-sm font-bold text-gray-800 mb-3">整單備註</p>
                                            <textarea className="w-full p-4 bg-gray-50 rounded-xl text-sm border outline-none border-gray-200" placeholder="例如：自備環保袋..." rows="2" value={globalNote} onChange={e=>setGlobalNote(e.target.value)} />
                                        </div>
                                    </div>
                                </div>
                                
                                <div className="bg-white p-6 pb-8 rounded-t-3xl shadow-[0_-10px_30px_rgba(0,0,0,0.05)] border-t border-gray-100">
                                    <div className="flex justify-between items-center mb-4 px-2">
                                        <span className="font-bold text-gray-500">總計金額</span>
                                        <span className="text-3xl font-black text-orange-600">${cart.reduce((s,i)=>s+i.displayPrice, 0)}</span>
                                    </div>
                                    <button id="submit-btn" onClick={submitOrder} disabled={isUpdating || !shopState.isOpen} className={`w-full py-4 rounded-full font-bold text-lg text-white shadow-lg active:scale-95 transition-transform flex justify-center items-center ${shopState.isOpen ? 'bg-gray-900 shadow-gray-900/30' : 'bg-gray-300 shadow-none'}`}>
                                        {isUpdating ? '處理中...' : (shopState.isOpen ? '確認送出訂單' : '目前休息中')}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {adminStep > 0 && (
                        <div className="fixed inset-0 z-[70] flex items-center justify-center p-6">
                            <div className="absolute inset-0 bg-gray-900/60 backdrop-blur-sm" onClick={() => setAdminStep(0)}></div>
                            <div className="relative bg-white w-full max-w-sm rounded-[32px] p-8 text-center space-y-6 shadow-2xl">
                                <h2 className="font-black text-2xl text-gray-900">後台管理</h2>
                                {isUpdating ? (
                                    <div className="py-8 space-y-4 text-orange-600 font-bold flex flex-col items-center">
                                        <div className="w-8 h-8 border-4 border-gray-100 border-t-orange-600 rounded-full animate-spin"></div>
                                        <p>狀態更新中...</p>
                                    </div>
                                ) : adminStep === 1 ? (
                                    <div className="space-y-4">
                                        <input type="password" placeholder="請輸入管理密碼" className="w-full p-4 bg-gray-50 rounded-xl text-center border outline-none text-lg tracking-widest border-gray-200" value={inputPwd} onChange={e=>setInputPwd(e.target.value)} />
                                        <button onClick={()=>setAdminStep(2)} className="w-full py-4 bg-gray-900 text-white rounded-xl font-bold text-lg hover:bg-black">登入</button>
                                    </div>
                                ) : (
                                    <div className="space-y-3">
                                        <button onClick={()=>toggleStatus('Y')} className="w-full py-4 bg-emerald-50 text-emerald-700 border border-emerald-200 rounded-xl font-bold text-lg hover:bg-emerald-100 transition-colors">開啟營業</button>
                                        <button onClick={()=>toggleStatus('N')} className="w-full py-4 bg-rose-50 text-rose-700 border border-rose-200 rounded-xl font-bold text-lg hover:bg-rose-100 transition-colors">關閉營業</button>
                                        <button onClick={() => setAdminStep(0)} className="pt-4 block w-full text-center text-gray-400 font-medium hover:text-gray-600">取消</button>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
